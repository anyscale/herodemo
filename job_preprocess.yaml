# Anyscale Job — Stage 1: Ray Data Preprocessing
# Submit with:  anyscale job submit -f job_preprocess.yaml

name: ecomm-preprocess

entrypoint: python preprocess_pipeline.py

image_uri: anyscale/ray:2.54.0-slim-py312

working_dir: .

requirements:
  - torch
  - transformers
  - sentence-transformers
  - pillow
  - numpy
  - pandas
  - pyarrow
  - ray[data]

compute_config:
  head_node:
    instance_type: m5.xlarge
  worker_nodes:
    - instance_type: m5.xlarge
      min_nodes: 0
      max_nodes: 2

max_retries: 1

# Anyscale Service Configuration — E-Commerce Recommendation System
# Deploy from project root with:  anyscale service deploy -f setup/service.yaml
# Status:       anyscale service status --name ecomm-recommender-service

name: ecomm-recommender-service

applications:
  - name: default
    import_path: serve_app:app
    route_prefix: /
    deployments:
      - name: RecommendationService
        num_replicas: 1
        max_ongoing_requests: 20
        ray_actor_options:
          num_cpus: 1

      - name: ImageToText
        num_replicas: 1
        max_ongoing_requests: 10
        ray_actor_options:
          num_cpus: 2

      - name: ProductRecommender
        num_replicas: 1
        max_ongoing_requests: 10
        ray_actor_options:
          num_cpus: 2

# CPU-only cluster (BLIP-base and MiniLM run fine on CPU for demo traffic)
compute_config:
  cloud: /subscriptions/78509d30-3712-444b-9fbc-5de6bcbeaa6d/resourcegroups/adhippublictest/providers/anyscale.platform/clouds/adhipcloudaks1
  head_node:
    required_resources:
      CPU: 8
      memory: 32Gi

image_uri: anyscale/ray:2.55.1-slim-py312-cu129

working_dir: .

requirements:
  - torch
  - transformers
  - sentence-transformers
  - hf_transfer
  - pillow
  - numpy
  - fastapi
  - pydantic

# Anyscale Job — Stage 2: Ray Train Embedding Fine-Tuning
# Submit from project root with:  anyscale job submit -f setup/job_train.yaml

name: ecomm-train-embedding

entrypoint: python train_embedding.py

image_uri: anyscale/ray:2.54.0-slim-py312

working_dir: .

requirements:
  - torch
  - sentence-transformers
  - numpy
  - pandas
  - pyarrow
  - ray[train,data]

compute_config:
  head_node:
    instance_type: m5.2xlarge
  worker_nodes:
    - instance_type: m5.2xlarge
      min_nodes: 0
      max_nodes: 1

max_retries: 1
